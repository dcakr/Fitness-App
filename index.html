<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Fitness">
<meta name="theme-color" content="#000000">
<title>Fitness Journal</title>
<style>
:root{
  --green:#30d158;--green2:rgba(48,209,88,0.15);
  --blue:#0a84ff;--blue2:rgba(10,132,255,0.15);
  --red:#ff453a;--red2:rgba(255,69,58,0.15);
  --amber:#ffb340;--amber2:rgba(255,179,64,0.15);
  --purple:#bf5af2;--teal:#5ac8fa;
  --bg:#000;--bg1:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;
  --text:#fff;--text2:rgba(255,255,255,0.55);--text3:rgba(255,255,255,0.28);
  --border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.2);
  --safe-top:env(safe-area-inset-top,44px);--safe-bot:env(safe-area-inset-bottom,34px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif}
body{overflow:hidden}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh}
#hdr{padding:calc(var(--safe-top)+6px) 16px 0;background:rgba(28,28,30,.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:.5px solid var(--border);z-index:10}
#cnt{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 14px 0;scrollbar-width:none}
#cnt::-webkit-scrollbar{display:none}
#tbar{padding:6px 0 calc(var(--safe-bot)+2px);background:rgba(28,28,30,.94);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:.5px solid var(--border);display:flex;z-index:10}

.hdr-top{display:flex;align-items:center;justify-content:space-between;padding-bottom:7px}
.hdr-title{flex:1;text-align:center;font-size:17px;font-weight:600}
.hdr-sub{text-align:center;font-size:11px;color:var(--text2);padding-bottom:6px}
.hdr-btn{width:34px;height:34px;border-radius:50%;border:none;background:var(--bg2);color:var(--text);font-size:17px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.saved{height:14px;text-align:center;font-size:11px;color:var(--green);opacity:0;transition:opacity .3s}
.stabs{display:flex;gap:6px;padding:6px 0 10px;overflow-x:auto;scrollbar-width:none}
.stabs::-webkit-scrollbar{display:none}
.stab{padding:6px 14px;border-radius:20px;font-size:13px;font-weight:500;white-space:nowrap;cursor:pointer;background:var(--bg2);color:var(--text2);border:none;font-family:inherit;flex-shrink:0}
.stab.on{background:var(--green);color:#000}

.titem{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 0;border:none;background:none;color:var(--text3);font-size:9px;font-weight:500;font-family:inherit;cursor:pointer}
.titem.on{color:var(--green)}
.ticon{font-size:21px;line-height:1}

.card{background:var(--bg1);border-radius:14px;padding:15px;margin-bottom:11px}
.ctitle{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;margin-bottom:13px}
.se{height:calc(var(--safe-bot)+24px)}

/* ── INPUTS – the key fix: no re-render on type ── */
.fi{display:flex;flex-direction:column;gap:5px}
.fl{font-size:12px;color:var(--text2)}
input[type=text],input[type=number],input[type=tel]{
  background:var(--bg2);border:none;border-radius:10px;
  padding:11px 13px;font-size:16px;color:var(--text);
  width:100%;font-family:inherit;outline:none;
  -webkit-appearance:none;appearance:none;
  /* prevent zoom on iOS */
  font-size:16px;
}
input::placeholder{color:var(--text3)}
.ig2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ig3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}

/* Checkbox */
.chkrow{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:.5px solid var(--border);cursor:pointer;user-select:none}
.chkrow:first-child{padding-top:0}
.chkrow:last-child{border-bottom:none;padding-bottom:0}
.chkbox{width:26px;height:26px;border-radius:50%;border:2px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s}
.chkbox.on{background:var(--green);border-color:var(--green)}
.chklbl{font-size:15px;line-height:1.3}

/* Stars */
.stars{display:flex;gap:6px}
.star{width:30px;height:30px;border-radius:50%;border:1.5px solid var(--border2);background:transparent;cursor:pointer;transition:all .15s;flex-shrink:0}
.star.on{background:var(--amber);border-color:var(--amber)}

/* Sport */
.spcard{background:var(--bg2);border-radius:13px;padding:14px;margin-bottom:9px}
.sphdr{display:flex;align-items:center;gap:10px;margin-bottom:13px}
.spbar{width:4px;height:36px;border-radius:2px;flex-shrink:0}
.spname{font-size:15px;font-weight:500;flex:1}
.tog{width:46px;height:28px;border-radius:14px;background:var(--bg3);border:none;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0}
.tog::after{content:'';width:24px;height:24px;border-radius:50%;background:#fff;position:absolute;top:2px;left:2px;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.5)}
.tog.on{background:var(--green)}
.tog.on::after{transform:translateX(18px)}
.ibtns{display:flex;gap:6px;margin-top:10px}
.ibtn{flex:1;padding:8px;border-radius:9px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:12px;font-family:inherit;cursor:pointer;transition:all .15s}
.timebtn-row{display:flex;gap:5px;margin-bottom:10px}
.tbtn{flex:1;padding:9px 0;border-radius:9px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);font-size:13px;font-weight:500;font-family:inherit;cursor:pointer;transition:all .15s;text-align:center}
.tbtn.on{border-color:var(--blue);background:var(--blue2);color:var(--blue)}

/* Water */
.wgrid{display:grid;grid-template-columns:repeat(6,1fr);gap:7px}
.bottle{background:var(--bg2);border:1.5px solid var(--border);border-radius:12px;padding:12px 0 7px;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;transition:all .18s;user-select:none}
.bottle.on{background:var(--blue2);border-color:var(--blue)}
.blbl{font-size:9px;font-weight:600;color:var(--text3)}
.bottle.on .blbl{color:var(--blue)}
.wprog{height:5px;background:var(--bg2);border-radius:3px;overflow:hidden;margin-bottom:13px}
.wfill{height:100%;background:var(--blue);border-radius:3px;transition:width .3s}

/* Banners */
.ban{border-radius:13px;padding:13px 15px;margin-bottom:11px}
.ban.a{background:var(--amber2);border:1px solid rgba(255,179,64,.3)}
.ban.b{background:var(--blue2);border:1px solid rgba(10,132,255,.25)}
.ban.r{background:var(--red2);border:1px solid rgba(255,69,58,.25)}
.btit{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:7px}
.btxt{font-size:13px;line-height:1.55;color:var(--text2)}

/* Tags */
.tagrow{display:flex;flex-wrap:wrap;gap:6px}
.tag{padding:5px 11px;border-radius:20px;font-size:12px;background:var(--bg2);color:var(--text2)}
.tag.g{background:var(--green2);color:var(--green)}
.tag.r{background:var(--red2);color:var(--red)}
.tag.a{background:var(--amber2);color:var(--amber)}

/* Timeline */
.tlbar{height:36px;border-radius:10px;background:var(--bg2);position:relative;overflow:hidden;margin-bottom:7px}
.tleat{position:absolute;top:0;bottom:0;background:var(--green)}
.tllbl{position:absolute;top:50%;transform:translateY(-50%);font-size:11px;font-weight:700;color:#000;left:0;right:0;text-align:center;pointer-events:none}
.tlticks{display:flex;justify-content:space-between;font-size:10px;color:var(--text2);padding:0 2px;margin-bottom:14px}

/* Pill */
.pill{display:inline-block;padding:4px 12px;border-radius:20px;font-size:13px;font-weight:500}

/* Stat cards */
.sg2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.sg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.sc{background:var(--bg2);border-radius:12px;padding:12px 10px;text-align:center}
.sv{font-size:22px;font-weight:600;margin-bottom:2px}
.sl{font-size:11px;color:var(--text2)}

/* Score rows */
.srow{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:.5px solid var(--border)}
.srow:last-child{border-bottom:none}

/* Weight big */
.wbig{font-size:48px;font-weight:300;background:transparent;border:none;border-bottom:2px solid var(--green);color:var(--text);width:100%;padding-bottom:4px;text-align:center;outline:none;-webkit-appearance:none;font-size:48px}
.wdiff{text-align:center;padding:14px;border-radius:12px;margin:10px 0}
.dval{font-size:32px;font-weight:500}
.dlbl{font-size:13px;color:var(--text2);margin-top:3px}
.tpills{display:flex;gap:8px;margin-bottom:14px}
.tpill{flex:1;text-align:center;padding:9px;border-radius:10px;font-size:12px;font-weight:500;background:var(--bg2);color:var(--text2);cursor:pointer;border:1.5px solid transparent;transition:all .15s}
.tpill.dn.on{border-color:var(--green);color:var(--green);background:var(--green2)}
.tpill.eq.on{border-color:var(--amber);color:var(--amber);background:var(--amber2)}
.tpill.up.on{border-color:var(--red);color:var(--red);background:var(--red2)}

/* Food */
.fgroup{background:var(--bg2);border-radius:12px;padding:13px;margin-bottom:9px}
.fgtit{font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;margin-bottom:9px}
.fitem{display:flex;align-items:center;gap:7px;padding:6px 0;font-size:14px;border-bottom:.5px solid var(--border)}
.fitem:last-child{border-bottom:none}
.fdot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

/* Week */
.wkgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:11px}
.wkday{background:var(--bg2);border-radius:10px;padding:8px 4px;text-align:center;cursor:pointer}
.wkday.today{border:1.5px solid var(--green)}
.wkdn{font-size:9px;color:var(--text2);margin-bottom:5px;font-weight:600}
.wkdt{font-size:11px;font-weight:600;margin-bottom:7px}
.wkdots{display:flex;flex-direction:column;gap:3px;align-items:center}
.wkdot{width:8px;height:8px;border-radius:50%}

/* Streak */
.streak-big{text-align:center;padding:18px 16px 14px}
.snum{font-size:72px;font-weight:700;color:var(--green);line-height:1}
.slbl2{font-size:14px;color:var(--text2);margin-top:4px}

/* Reminder */
.rembox{border-radius:13px;padding:14px 16px;background:var(--bg2);display:flex;align-items:center;gap:14px;margin-bottom:11px}
.remicon{font-size:32px}
.remtime{font-size:22px;font-weight:600}
.remsub{font-size:12px;color:var(--text2);margin-top:2px}

/* Chart */
.chart-wrap{border-radius:14px;background:var(--bg1);padding:15px;margin-bottom:11px}

/* Profile setup */
.setup{position:fixed;inset:0;background:var(--bg);z-index:100;overflow-y:auto;padding:calc(var(--safe-top)+20px) 24px calc(var(--safe-bot)+24px)}
.setup-title{font-size:28px;font-weight:700;margin-bottom:6px}
.setup-sub{font-size:15px;color:var(--text2);margin-bottom:28px;line-height:1.5}
.slabel{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--text2);margin-bottom:8px;margin-top:20px;display:block}
.grows{display:flex;gap:10px}
.gbtn{flex:1;padding:16px;border-radius:14px;border:1.5px solid var(--border2);background:var(--bg2);color:var(--text2);font-size:22px;cursor:pointer;text-align:center;font-family:inherit;transition:all .15s}
.gbtn span{display:block;font-size:13px;margin-top:4px;font-weight:500}
.gbtn.on{border-color:var(--green);background:var(--green2);color:var(--green)}
.setup-inp{background:var(--bg2);border:none;border-radius:12px;padding:14px;font-size:17px;color:var(--text);width:100%;font-family:inherit;outline:none;-webkit-appearance:none}
.save-btn{width:100%;padding:16px;border-radius:14px;background:var(--green);color:#000;font-size:17px;font-weight:700;border:none;cursor:pointer;margin-top:28px;font-family:inherit}

/* Profile page */
.pav{width:72px;height:72px;border-radius:50%;background:var(--green2);border:2px solid var(--green);display:flex;align-items:center;justify-content:center;font-size:30px;margin:0 auto 12px}
.edit-btn{width:100%;padding:13px;border-radius:12px;background:var(--bg2);border:none;color:var(--text2);font-size:15px;cursor:pointer;font-family:inherit;margin-bottom:9px}

@media(hover:none){
  .bottle:active{transform:scale(.92)}
  .chkrow:active{opacity:.7}
  .tog:active{transform:scale(.9)}
  .tpill:active{opacity:.7}
}
</style>
</head>
<body>
<div id="app">
  <div id="hdr">
    <div class="hdr-top">
      <button class="hdr-btn" id="bPrev">‹</button>
      <div class="hdr-center">
        <div class="hdr-title" id="hTitle"></div>
        <div class="hdr-sub" id="hSub"></div>
      </div>
      <button class="hdr-btn" id="bProf">👤</button>
    </div>
    <div class="saved" id="saved">Gespeichert ✓</div>
    <div class="stabs" id="stabs"></div>
  </div>
  <div id="cnt"></div>
  <div id="tbar"></div>
</div>
<div id="setup" class="setup" style="display:none"></div>

<script>
/* ════════════════════════════════
   CONSTANTS
════════════════════════════════ */
const SP=[
  {key:'laufen',label:'Laufen / Cardio',f1:'Distanz (km)',f2:'Pace (min/km)',c:'#0a84ff'},
  {key:'kraft', label:'Krafttraining',  f1:'Übungen',    f2:'Sätze × Wdh.',c:'#ff453a'},
  {key:'rad',   label:'Radfahren',      f1:'Distanz (km)',f2:'Höhenmeter',  c:'#30d158'},
  {key:'yoga',  label:'Yoga / Dehnen',  f1:'Dauer (min)', f2:'Programm',   c:'#bf5af2'},
  {key:'spa',   label:'Spazierengehen', f1:'Schritte',    f2:'Dauer (min)',c:'#8e8e93'},
  {key:'golf',  label:'Golf',           f1:'Löcher/Range',f2:'Score',       c:'#ffd60a'},
];
const FOOD=[
  {label:'Protein',c:'#ff453a',items:['Hähnchen / Pute','Lachs / Thunfisch','Eier (hart-/weichgekocht)','Magerquark','Griech. Joghurt 0–2%','Linsen / Kichererbsen']},
  {label:'Gemüse', c:'#30d158',items:['Brokkoli / Blumenkohl','Zucchini / Gurke / Paprika','Spinat / Rucola','Tomaten / Radieschen']},
  {label:'Gesunde Fette',c:'#ffb340',items:['Avocado (½ pro Tag)','Mandeln / Walnüsse','Olivenöl kaltgepresst','Leinsamen / Chiasamen']},
  {label:'Snacks',c:'#5ac8fa',items:['Beeren (Blaubeeren, Erdbeeren)','Apfel / Birne (ganz)','Dunkle Schokolade 85%+','Kräutertee / grüner Tee']},
];
const AVOID=['Weißbrot / Pasta / Reis','Zucker & Süßigkeiten','Alkohol','Fruchtsäfte / Limo','Fertiggerichte','Chips / Fast Food'];
const SNACKS=['Joghurt 0–2%','Hüttenkäse','Magerquark','Hartgekochte Eier','Mandeln','Walnüsse','Lachs','Thunfisch','Brokkoli gedünstet','Kräutertee'];

const defDay=()=>({
  fasten:{firstMeal:false,lastMeal:false,done:false,note:''},
  sport:Object.fromEntries(SP.map(s=>[s.key,{done:false,dauer:'',f1:'',f2:'',intens:''}])),
  wasser:[false,false,false,false,false,false],
  schlaf:{ein:'',auf:'',std:'',qual:0},
  essen:{frueh:'',mittag:'',abend:'',snack:''},
  fazit:{energie:0,stimmung:0,gut:'',besser:''},
});
const defW=(lk='')=>({thisWeek:'',lastWeek:lk,trend:'',note:'',
  sport:Object.fromEntries(SP.map(s=>[s.key,{count:'',detail:''}])),
  scores:{fasten:0,sport:0,wasser:0,schlaf:0,ernaehrung:0},
  refl:{gut:'',fasten:'',ernaehrung:'',sportziel:'',motivation:''},
});

/* ════════════════════════════════
   STATE
════════════════════════════════ */
let cur=new Date(), day=defDay(), wt=defW(), sec='dashboard', savedT, clockT;
const toISO=d=>d.toISOString().split('T')[0];
const isMon=d=>d.getDay()===1;
const dk=()=>'fit:d:'+toISO(cur);
const wk=()=>'fit:w:'+toISO(cur);

/* ════════════════════════════════
   STORAGE  –  no re-render on save
════════════════════════════════ */
const ls={
  g:k=>{try{const r=localStorage.getItem(k);return r?JSON.parse(r):null}catch{return null}},
  s:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch{}},
};
const getProf=()=>ls.g('fit:profile');
const saveProf=p=>ls.s('fit:profile',p);

function mDeep(def,src){
  const r={...def};
  for(const k in src){
    if(src[k]&&typeof src[k]==='object'&&!Array.isArray(src[k])&&def[k]&&typeof def[k]==='object')
      r[k]=mDeep(def[k],src[k]);
    else r[k]=src[k];
  }
  return r;
}

function load(){
  const d=ls.g(dk()); day=d?mDeep(defDay(),d):defDay();
  if(isMon(cur)){
    const w=ls.g(wk());
    if(w){wt=w;}else{
      const prev=new Date(cur);prev.setDate(prev.getDate()-7);
      const pw=ls.g('fit:w:'+toISO(prev));
      wt=defW(pw?pw.thisWeek||'':'');
    }
  }
}

function setPath(obj,path,val){
  const p=path.split('.');let o=obj;
  for(let i=0;i<p.length-1;i++)o=o[p[i]];
  o[p[p.length-1]]=val;
}

function flashSaved(){
  const el=document.getElementById('saved');
  el.style.opacity='1';
  clearTimeout(savedT);
  savedT=setTimeout(()=>el.style.opacity='0',1400);
}

/* ── KEY DISTINCTION:
   upDay  = update data + save + RE-RENDER  (for toggles/checkboxes/stars)
   upDayQ = update data + save only          (for text inputs – no re-render!)
   upWt / upWtQ = same for weight page
── */
function upDay(path,val){setPath(day,path,val);ls.s(dk(),day);flashSaved();render();}
function upDayQ(path,val){setPath(day,path,val);ls.s(dk(),day);flashSaved();}
function upWt(path,val){setPath(wt,path,val);ls.s(wk(),wt);flashSaved();render();}
function upWtQ(path,val){setPath(wt,path,val);ls.s(wk(),wt);flashSaved();}

/* ════════════════════════════════
   DOM HELPERS
════════════════════════════════ */
function h(tag,attrs,...kids){
  const el=document.createElement(tag);
  for(const[k,v]of Object.entries(attrs||{})){
    if(k==='class')el.className=v;
    else if(k==='style')el.style.cssText=v;
    else if(k.startsWith('on'))el.addEventListener(k.slice(2).toLowerCase(),v);
    else el.setAttribute(k,v);
  }
  for(const c of kids){if(c==null||c===false)continue;el.append(typeof c==='string'?document.createTextNode(c):c);}
  return el;
}

/* ── Smart input: saves silently, no re-render, no focus loss ── */
function inp(val, saveFn, placeholder='', type='text', extraStyle=''){
  const el=document.createElement('input');
  el.type=type; el.value=val||''; el.placeholder=placeholder;
  if(extraStyle) el.style.cssText=extraStyle;
  /* use 'change' + 'input': change fires on blur (reliability), input fires live for saving */
  el.addEventListener('input', e=>saveFn(e.target.value));
  /* prevent form submission / page jump on Enter */
  el.addEventListener('keydown', e=>{ if(e.key==='Enter') el.blur(); });
  return el;
}

/* Labeled field wrapper */
function field(label, inputEl){
  return h('div',{class:'fi'}, h('div',{class:'fl'},label), inputEl);
}

function chk(checked,label,onclick){
  return h('div',{class:'chkrow',onClick:onclick},
    h('div',{class:'chkbox'+(checked?' on':'')},
      checked?svgChk():null
    ),
    h('span',{class:'chklbl'},label)
  );
}
function svgChk(){
  const s=document.createElementNS('http://www.w3.org/2000/svg','svg');
  s.setAttribute('width','12');s.setAttribute('height','10');s.setAttribute('viewBox','0 0 12 10');
  const p=document.createElementNS('http://www.w3.org/2000/svg','path');
  p.setAttribute('d','M1 5l4 4 6-8');p.setAttribute('stroke','white');p.setAttribute('stroke-width','2');
  p.setAttribute('fill','none');p.setAttribute('stroke-linecap','round');p.setAttribute('stroke-linejoin','round');
  s.append(p);return s;
}
function stars(val,onchange){
  const row=h('div',{class:'stars'});
  for(let i=0;i<5;i++) row.append(h('div',{class:'star'+(i<val?' on':''),onClick:()=>onchange(i+1)}));
  return row;
}
function card(title,color,...kids){
  return h('div',{class:'card'},title?h('div',{class:'ctitle',style:`color:${color||'var(--text2)'}`},title):null,...kids);
}
function svgBottle(on){
  const s=document.createElementNS('http://www.w3.org/2000/svg','svg');
  s.setAttribute('width','20');s.setAttribute('height','28');s.setAttribute('viewBox','0 0 20 28');

════════════════════════════════ */
function calcStreak(){
  let s=0,d=new Date(cur);
  for(let i=0;i<365;i++){
    const data=ls.g('fit:d:'+toISO(d));
    if(data&&data.fasten&&data.fasten.done)s++;
    else if(i>0)break;
    d.setDate(d.getDate()-1);
  }
  return s;
}
function bmiCalc(kg,cm){if(!kg||!cm)return null;return(kg/((cm/100)**2)).toFixed(1);}
function calcBMI(p){return bmiCalc(p&&p.weight,p&&p.height);}
function bmiInfo(b){
  const v=parseFloat(b);
  if(v<18.5)return{l:'Untergewicht',c:'var(--teal)'};
  if(v<25)  return{l:'Normalgewicht',c:'var(--green)'};
  if(v<30)  return{l:'Übergewicht',  c:'var(--amber)'};
  return         {l:'Adipositas',    c:'var(--red)'};
}
function getLatestWeight(){
  for(let i=0;i<52;i++){
    const d=new Date(cur);
    const off=d.getDay()===0?6:d.getDay()-1;
    d.setDate(d.getDate()-off-i*7);
    const w=ls.g('fit:w:'+toISO(d));
    if(w&&w.thisWeek)return parseFloat(w.thisWeek);
  }
  return null;
}
function progBar(pct,color){
  const b=h('div',{style:'height:7px;background:var(--bg3);border-radius:4px;overflow:hidden;margin-top:8px'});
  b.append(h('div',{style:'height:100%;width:'+Math.min(100,Math.max(0,pct))+'%;background:'+color+';border-radius:4px;transition:width .4s'}));
  return b;
}
function getReminder(){
  const n=new Date(),hh=n.getHours(),mm=n.getMinutes(),nm=hh*60+mm;
  const es=9*60+30,ee=18*60+30;
  if(nm<es){const d=es-nm;return{txt:'Erste Mahlzeit',sub:`in ${Math.floor(d/60)}h ${d%60}min`,c:'var(--amber)',icon:'⏳'};}
  if(nm<ee){const d=ee-nm;return{txt:'Fastenstart',sub:`in ${Math.floor(d/60)}h ${d%60}min`,c:'var(--green)',icon:'⏱'};}
  return{txt:'Fasten läuft ✅',sub:'Letzte Mahlzeit war 18:30',c:'var(--teal)',icon:'🔒'};
}
function getWeekDays(){
  const days=[],d=new Date(cur);
  d.setDate(d.getDate()-d.getDay()+1);
  for(let i=0;i<7;i++){const dd=new Date(d);days.push({date:dd,data:ls.g('fit:d:'+toISO(dd))});d.setDate(d.getDate()+1);}
  return days;
}
function getAllWeights(){
  const ws=[];
  for(let i=19;i>=0;i--){
    const d=new Date(cur);
    d.setDate(d.getDate()-d.getDay()+1-i*7);
    const w=ls.g('fit:w:'+toISO(d));
    if(w&&w.thisWeek)ws.push({date:new Date(d),kg:parseFloat(w.thisWeek)});
  }
  return ws;
}

      const ctx=cv.getContext('2d');ctx.scale(2,2);
      const pad={t:22,r:16,b:28,l:38};
      const cwidth=W-pad.l-pad.r,ch=H-pad.t-pad.b;
      const vals=weights.map(w=>w.kg);
      const mn=Math.min(...vals)-1,mx=Math.max(...vals)+1;
      const xStep=cwidth/(weights.length-1||1);
      const yS=v=>ch-(v-mn)/(mx-mn)*ch;
      ctx.strokeStyle='rgba(255,255,255,0.06)';ctx.lineWidth=0.5;
      for(let i=0;i<=4;i++){
        const y=pad.t+i*ch/4;
        ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(pad.l+cwidth,y);ctx.stroke();
        ctx.fillStyle='rgba(255,255,255,.35)';ctx.font='9px -apple-system';ctx.textAlign='right';
        ctx.fillText((mx-(mx-mn)*i/4).toFixed(1),pad.l-4,y+3);
      }
      ctx.fillStyle='rgba(255,255,255,.35)';ctx.font='9px -apple-system';ctx.textAlign='center';
      weights.forEach((w,i)=>{const x=pad.l+i*xStep;ctx.fillText(w.date.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit'}),x,H-pad.b+12);});
      const g=ctx.createLinearGradient(0,pad.t,0,pad.t+ch);g.addColorStop(0,'rgba(48,209,88,.3)');g.addColorStop(1,'rgba(48,209,88,0)');
      ctx.beginPath();weights.forEach((w,i)=>{const x=pad.l+i*xStep,y=pad.t+yS(w.kg);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});
      ctx.lineTo(pad.l+(weights.length-1)*xStep,pad.t+ch);ctx.lineTo(pad.l,pad.t+ch);ctx.closePath();ctx.fillStyle=g;ctx.fill();
      ctx.strokeStyle='#30d158';ctx.lineWidth=2;ctx.lineJoin='round';ctx.beginPath();
      weights.forEach((w,i)=>{const x=pad.l+i*xStep,y=pad.t+yS(w.kg);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});ctx.stroke();
      weights.forEach((w,i)=>{
        const x=pad.l+i*xStep,y=pad.t+yS(w.kg);
        ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);ctx.fillStyle='#30d158';ctx.fill();
        ctx.fillStyle='#fff';ctx.font='bold 10px -apple-system';ctx.textAlign='center';ctx.fillText(w.kg.toFixed(1),x,y-9);
      });
    },60);

  if(startW&&latestW){
    const lost=Math.max(0,startW-latestW).toFixed(1);
    wrap.append(h('div',{class:'sg2',style:'margin-bottom:11px'},
      h('div',{class:'sc'},h('div',{class:'sv',style:'color:var(--text2)'},startW+' kg'),h('div',{class:'sl'},'Startgewicht')),
      h('div',{class:'sc'},h('div',{class:'sv',style:'color:var(--green)'},'-'+lost+' kg'),h('div',{class:'sl'},'Abgenommen')),
    ));
  }
  wrap.append(h('div',{class:'se'}));
  return wrap;
}

function rGewicht(){
  const w=wt;
  const diff=w.thisWeek&&w.lastWeek?(parseFloat(w.thisWeek)-parseFloat(w.lastWeek)).toFixed(1):null;
  const dn=diff&&parseFloat(diff)<0,up2=diff&&parseFloat(diff)>0;
  return h('div',{},
    card('Nüchterngewicht – Montag früh','var(--amber)',
      h('div',{class:'ig2',style:'margin-bottom:16px'},
        h('div',{style:'text-align:center'},
          h('div',{class:'fl',style:'text-align:center;margin-bottom:6px'},'Diese Woche (kg)'),
          (()=>{const el=document.createElement('input');el.type='number';el.step='0.1';el.value=w.thisWeek||'';el.placeholder='0.0';el.className='wbig';el.addEventListener('input',e=>upWtQ('thisWeek',e.target.value));el.addEventListener('keydown',e=>{if(e.key==='Enter')el.blur();});return el;})()
        ),
        h('div',{style:'text-align:center'},
          h('div',{class:'fl',style:'text-align:center;margin-bottom:6px'},'Letzte Woche (kg)'),
          (()=>{const el=document.createElement('input');el.type='number';el.step='0.1';el.value=w.lastWeek||'';el.placeholder='0.0';el.className='wbig';el.style.borderBottomColor='var(--bg3)';el.addEventListener('input',e=>upWtQ('lastWeek',e.target.value));el.addEventListener('keydown',e=>{if(e.key==='Enter')el.blur();});return el;})()
        )
      ),
      diff?h('div',{class:`wdiff ${dn?'':up2?'':''}`},
        h('div',{class:'dval',style:`background:${dn?'var(--green2)':up2?'var(--red2)':'var(--bg2)'};border-radius:12px;padding:14px;color:${dn?'var(--green)':up2?'var(--red)':'var(--text2)'}`},(up2?'+':'')+diff+' kg'),
        h('div',{class:'dlbl'},dn?'Abgenommen 🎉':up2?'Zugenommen':'Gleichgeblieben')
      ):null,
      h('div',{class:'tpills'},
        ...[ ['dn','▼ Abgenommen'],['eq','= Gleich'],['up','▲ Zugenommen'] ].map(([cls,lbl])=>
          h('div',{class:`tpill ${cls}${w.trend===cls?' on':''}`,onClick:()=>upWt('trend',cls)},lbl)
        )
      ),
      field('Notiz', inp(w.note,v=>upWtQ('note',v),'Besonderheiten diese Woche...')),
      (() => {
        const prof2=getProf();
        if(!prof2||!prof2.height)return null;
        const thisKg=parseFloat(w.thisWeek);
        const lastKg=parseFloat(w.lastWeek);
        if(!thisKg)return null;
        const thisBmi=bmiCalc(thisKg,prof2.height);
        const lastBmi=lastKg?bmiCalc(lastKg,prof2.height):null;
        const bi2=bmiInfo(thisBmi);
        return h('div',{style:'margin-top:12px;padding-top:12px;border-top:.5px solid var(--border)'},
          h('div',{style:'display:flex;align-items:center;justify-content:space-between'},
            h('div',{},
              h('div',{style:'font-size:11px;color:var(--text2);margin-bottom:3px'},'BMI diese Woche'),
              h('div',{style:'font-size:28px;font-weight:500;color:'+bi2.c},thisBmi)
            ),
            h('div',{style:'text-align:right'},
              h('span',{class:'pill',style:'background:var(--bg3);color:'+bi2.c+';font-size:12px;display:block;margin-bottom:6px'},bi2.l),
              lastBmi?h('div',{style:'font-size:12px;color:var(--text2)'},'Vorwoche: '+lastBmi):null
            )
          )
        );
      })()
    ),
    card('Wochenrückblick Sport','var(--green)',
      ...SP.map(sp=>h('div',{style:'display:flex;align-items:center;gap:8px;margin-bottom:11px'},
        h('div',{style:`width:4px;height:28px;border-radius:2px;background:${sp.c};flex-shrink:0`}),
        h('span',{style:'font-size:12px;width:95px;flex-shrink:0'},sp.label),
        inp((w.sport[sp.key]||{}).count||'',v=>upWtQ(`sport.${sp.key}.count`,v),'×','text','width:44px;padding:8px 6px;text-align:center;border-radius:8px'),
        inp((w.sport[sp.key]||{}).detail||'',v=>upWtQ(`sport.${sp.key}.detail`,v),'Detail...','text','flex:1;border-radius:8px')
      ))
    ),
    card('Wochenscore','var(--amber)',
      ...[['Intervallfasten','fasten'],['Sport','sport'],['Wasser 3L','wasser'],['Schlaf','schlaf'],['Ernährung','ernaehrung']].map(([lbl,k])=>
        h('div',{class:'srow'},h('span',{style:'font-size:15px'},lbl),stars((w.scores||{})[k]||0,v=>upWt(`scores.${k}`,v)))
      )
    ),
    card('Wochenreflexion','var(--purple)',
      ...[['Was lief besonders gut?','gut'],['Fasten nicht eingehalten – warum?','fasten'],['Nächste Woche besser essen:','ernaehrung'],['Sportziel nächste Woche:','sportziel'],['Meine Motivation:','motivation']].map(([lbl,k])=>
        h('div',{style:'margin-bottom:12px'}, field(lbl, inp((w.refl||{})[k]||'',v=>upWtQ(`refl.${k}`,v),'...')))
      )
    ),
    h('div',{class:'se'})
  );
}

function rProfil(){
  const p=getProf()||{};
  return h('div',{},
    card(null,null,
      h('div',{class:'pav'},p.gender==='w'?'🌸':'💪'),
      h('div',{style:'font-size:22px;font-weight:700;text-align:center;margin-bottom:4px'},p.name||'–'),
      h('div',{style:'font-size:13px;color:var(--text2);text-align:center;margin-bottom:20px'},(p.gender==='m'?'Mann':'Frau')+' · '+p.height+' cm · Startgewicht: '+p.weight+' kg'),
    ),
    h('div',{class:'sg2',style:'margin-bottom:11px'},
      h('div',{class:'sc'},h('div',{class:'sv'},p.height+' cm'),h('div',{class:'sl'},'Körpergröße')),
      h('div',{class:'sc'},h('div',{class:'sv'},p.weight+' kg'),h('div',{class:'sl'},'Startgewicht')),
      h('div',{class:'sc'},h('div',{class:'sv',style:'color:var(--green)'},p.targetWeight?p.targetWeight+' kg':'–'),h('div',{class:'sl'},'Zielgewicht')),
      h('div',{class:'sc'},h('div',{class:'sv',style:'color:var(--amber)'},bmiCalc(parseFloat(p.weight),p.height)||'–'),h('div',{class:'sl'},'Start-BMI')),
    ),
    h('button',{class:'edit-btn',onClick:()=>showSetup(true)},'✏️  Profil bearbeiten'),
    h('div',{class:'se'})
  );
}

/* ════════════════════════════════
   PROFILE SETUP
════════════════════════════════ */
function showSetup(edit=false){
  const p=getProf()||{};
  const scr=document.getElementById('setup');
  let g=p.gender||'';
  scr.innerHTML='';scr.style.display='block';
  const nameI=Object.assign(document.createElement('input'),{type:'text',value:p.name||'',placeholder:'Dein Name',className:'setup-inp'});
  const htI=Object.assign(document.createElement('input'),{type:'number',value:p.height||'',placeholder:'z.B. 178',className:'setup-inp'});
  const wI=Object.assign(document.createElement('input'),{type:'number',step:'0.1',value:p.weight||'',placeholder:'z.B. 88.5',className:'setup-inp'});
  const tgI=Object.assign(document.createElement('input'),{type:'number',step:'0.1',value:p.targetWeight||'',placeholder:'z.B. 83.0',className:'setup-inp'});
  const mB=h('div',{class:'gbtn'+(g==='m'?' on':''),onClick:()=>{g='m';mB.className='gbtn on';wB.className='gbtn';}},'💪',h('span',{},'Mann'));
  const wB=h('div',{class:'gbtn'+(g==='w'?' on':''),onClick:()=>{g='w';wB.className='gbtn on';mB.className='gbtn';}},'🌸',h('span',{},'Frau'));
  scr.append(
    h('div',{style:'font-size:36px;margin-bottom:12px'},edit?'✏️':'🏋'),
    h('div',{class:'setup-title'},edit?'Profil bearbeiten':'Willkommen!'),
    h('div',{class:'setup-sub'},edit?'Passe deine Daten an.':'Einmalige Einrichtung deines persönlichen Fitness Journals.'),
    h('label',{class:'slabel'},'Dein Name'),nameI,
    h('label',{class:'slabel'},'Geschlecht'),h('div',{class:'grows'},mB,wB),
    h('label',{class:'slabel'},'Körpergröße (cm)'),htI,
    h('label',{class:'slabel'},'Startgewicht (kg)'),wI,
    h('label',{class:'slabel'},'Zielgewicht (kg)'),tgI,
    h('button',{class:'save-btn',onClick:()=>{
      saveProf({name:nameI.value||'Du',gender:g||'m',height:parseFloat(htI.value)||175,weight:parseFloat(wI.value)||85,targetWeight:parseFloat(tgI.value)||null});
      scr.style.display='none';sec='dashboard';render();
    }},edit?'Speichern ✓':'Los geht\'s! 💪')
  );
}

/* ════════════════════════════════
   RENDER
════════════════════════════════ */
const SECS=[
  {key:'dashboard',label:'Home',   icon:'🏠'},
  {key:'fasten',   label:'Fasten', icon:'⏱'},
  {key:'sport',    label:'Sport',  icon:'🏃'},
  {key:'wasser',   label:'Wasser', icon:'💧'},
  {key:'essen',    label:'Essen',  icon:'🥗'},
  {key:'guide',    label:'Guide',  icon:'📋'},
  {key:'schlaf',   label:'Schlaf', icon:'🌙'},
  {key:'fazit',    label:'Fazit',  icon:'✅'},
  {key:'woche',    label:'Woche',  icon:'📅'},
  {key:'kurve',    label:'Kurve',  icon:'📊'},
  {key:'profil',   label:'Profil', icon:'👤'},
];
const WSEC={key:'gewicht',label:'Gewicht',icon:'⚖'};
const BOTTOM=['dashboard','fasten','sport','wasser','fazit'];
const MAPS={dashboard:rDashboard,fasten:rFasten,sport:rSport,wasser:rWasser,essen:rEssen,guide:rGuide,schlaf:rSchlaf,fazit:rFazit,woche:rWoche,kurve:rKurve,gewicht:rGewicht,profil:rProfil};

function fmtDate(d){return d.toLocaleDateString('de-DE',{weekday:'long',day:'2-digit',month:'2-digit',year:'numeric'});}

function render(){
  const secs=isMon(cur)?[...SECS,WSEC]:SECS;
  const tod=toISO(new Date())===toISO(cur);
  document.getElementById('hTitle').textContent=tod?'Heute – '+new Date().toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit'}):'Fitness Journal';
  document.getElementById('hSub').textContent=fmtDate(cur)+(isMon(cur)?' · ⭐ Montagscheck':'');

  const st=document.getElementById('stabs');st.innerHTML='';
  for(const s of secs){
    const b=h('button',{class:'stab'+(sec===s.key?' on':''),onClick:()=>{sec=s.key;render();}},s.icon+' '+s.label);
    st.append(b);
  }
  setTimeout(()=>{const a=st.querySelector('.on');if(a)a.scrollIntoView({inline:'center',block:'nearest',behavior:'smooth'});},40);

  const cnt=document.getElementById('cnt');
  cnt.innerHTML='';
  cnt.append((MAPS[sec]||rDashboard)());
  cnt.scrollTop=0;

  const tb=document.getElementById('tbar');tb.innerHTML='';
  for(const key of [...BOTTOM,...(isMon(cur)?['gewicht']:[])]) {
    const s=secs.find(x=>x.key===key);if(!s)continue;
    tb.append(h('button',{class:'titem'+(sec===s.key?' on':''),onClick:()=>{sec=s.key;render();}},h('div',{class:'ticon'},s.icon),s.label));
  }
}

/* ════════════════════════════════
   INIT
════════════════════════════════ */
document.getElementById('bPrev').addEventListener('click',()=>{cur.setDate(cur.getDate()-1);cur=new Date(cur);load();sec='dashboard';render();});
document.getElementById('bProf').addEventListener('click',()=>{sec='profil';render();});

clearInterval(clockT);
clockT=setInterval(()=>{if(sec==='dashboard')render();},60000);

load();
if(!getProf()) showSetup(false);
else render();
</script>
</body>
</html>
